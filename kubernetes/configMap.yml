apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-config
data:
  application.yml: |
    spring:
      application:
        name: demo
      datasource:
        url: jdbc:h2:mem:recipedb
        driverClassName: org.h2.Driver
        username: ${SPRING_DATASOURCE_USERNAME}
        password: ${SPRING_DATASOURCE_PASSWORD}
      jpa:
        database-platform: org.hibernate.dialect.H2Dialect
        hibernate:
          ddl-auto: update
      h2:
        console:
          enabled: true
          path: /h2-console
    springdoc:
      api-docs:
        path: /api-docs
      swagger-ui:
        path: /swagger-ui.html